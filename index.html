<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCCD Scan V3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="mobile-app">
    <header class="topbar">
      <div>
        <p class="mini-label">SCAN CCCD V3</p>
        <h1>Chụp thủ công, OCR mạnh hơn</h1>
      </div>
      <button class="icon-btn" id="resetFlowBtn" title="Làm lại">↺</button>
    </header>

    <section class="camera-card">
      <div class="camera-toolbar">
        <div class="step-pills">
          <button class="step-pill active" data-step="front">Mặt trước</button>
          <button class="step-pill" data-step="back">Mặt sau</button>
          <button class="step-pill" data-step="qr">QR</button>
        </div>
        <div class="camera-tools">
          <button class="tool-btn" id="startCameraBtn">Bật camera</button>
          <button class="tool-btn" id="switchCameraBtn">Đổi camera</button>
        </div>
      </div>

      <div class="camera-stage">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="captureCanvas" hidden></canvas>
        <div class="camera-overlay">
          <div class="guide-frame"></div>
          <div class="camera-status">
            <strong id="captureHint">Mặt trước</strong>
            <span id="captureSubtext">Auto capture đã tắt. Người dùng chủ động chụp để chính xác hơn.</span>
          </div>
        </div>
      </div>

      <div class="capture-actions three-col">
        <button class="main-btn" id="captureBtn">📸 Chụp bước hiện tại</button>
        <button class="soft-btn" id="runOcrBtn">🧠 OCR lại</button>
        <button class="soft-btn" id="scanQrBtn">🔍 Đọc QR</button>
        <label class="soft-btn upload-btn">
          Tải ảnh
          <input type="file" id="imageUpload" accept="image/*" multiple hidden>
        </label>
      </div>

      <div class="preview-strip">
        <div class="preview-item">
          <span>Trước</span>
          <img id="frontPreview" alt="Mặt trước CCCD" />
        </div>
        <div class="preview-item">
          <span>Sau</span>
          <img id="backPreview" alt="Mặt sau CCCD" />
        </div>
        <div class="preview-item">
          <span>QR</span>
          <img id="qrPreview" alt="QR CCCD" />
        </div>
      </div>
    </section>

    <section class="info-card">
      <div id="statusBanner" class="status-banner info">Sẵn sàng chụp hồ sơ mới.</div>

      <div class="section-head">
        <h2>Thông tin nhận dạng</h2>
        <div class="head-actions">
          <button class="text-btn" id="copyAllBtn">Copy toàn bộ</button>
          <button class="text-btn" id="fillCurrentFromPermanentBtn">Copy thường trú → hiện tại</button>
        </div>
      </div>

      <form id="recordForm" class="compact-form">
        <div class="field full">
          <label>Họ và tên</label>
          <input type="text" id="fullName" placeholder="Họ và tên" />
        </div>
        <div class="field">
          <label>Số CCCD</label>
          <input type="text" id="idNumber" placeholder="Số CCCD" />
        </div>
        <div class="field">
          <label>Số CMND cũ</label>
          <input type="text" id="oldIdNumber" placeholder="Nếu có" />
        </div>
        <div class="field">
          <label>Ngày sinh</label>
          <input type="text" id="birthDate" placeholder="dd/mm/yyyy" />
        </div>
        <div class="field">
          <label>Giới tính</label>
          <select id="gender">
            <option value="">Chọn giới tính</option>
            <option value="Nam">Nam</option>
            <option value="Nữ">Nữ</option>
          </select>
        </div>
        <div class="field">
          <label>Ngày cấp</label>
          <input type="text" id="issueDate" placeholder="dd/mm/yyyy" />
        </div>
        <div class="field">
          <label>Ngày hết hạn</label>
          <input type="text" id="expiryDate" placeholder="dd/mm/yyyy hoặc Không thời hạn" />
        </div>
        <div class="field full">
          <label>Nơi cấp</label>
          <input type="text" id="issuePlace" placeholder="Nơi cấp" />
        </div>
        <div class="field full">
          <label>Địa chỉ thường trú</label>
          <textarea id="permanentAddress" rows="3" placeholder="Địa chỉ thường trú"></textarea>
        </div>
        <div class="field full">
          <label>Địa chỉ hiện tại</label>
          <textarea id="currentAddress" rows="3" placeholder="Địa chỉ hiện tại"></textarea>
        </div>
      </form>

      <div class="sticky-actions">
        <button class="secondary-btn" id="exportJsonBtn">Xuất JSON</button>
        <button class="primary-btn" id="saveRecordBtn">Lưu hồ sơ</button>
      </div>
    </section>

    <section class="database-card">
      <div class="section-head stacked-mobile">
        <div>
          <h2>Danh sách hồ sơ</h2>
          <p class="muted">IndexedDB + tìm kiếm nhanh + in đầy đủ.</p>
        </div>
        <label class="text-btn upload-inline">
          Nhập JSON
          <input type="file" id="importJsonInput" accept="application/json" hidden>
        </label>
      </div>

      <input type="search" id="searchInput" class="search-input" placeholder="Tìm theo tên, số CCCD, CMND cũ, địa chỉ..." />
      <div class="record-list" id="recordsTableBody"></div>
    </section>
  </div>

  <template id="recordCardTemplate">
    <div class="record-card-item">
      <div class="record-card-head">
        <div>
          <strong class="record-name"></strong>
          <p class="record-meta"></p>
        </div>
      </div>
      <div class="record-address"></div>
      <div class="row-actions">
        <button class="action-link action-open">Mở</button>
        <button class="action-link action-copy">Copy</button>
        <button class="action-link action-print">In</button>
        <button class="action-link action-delete danger">Xóa</button>
      </div>
    </div>
  </template>

  <template id="printTemplate">
    <div class="print-sheet">
      <h1>Hồ sơ CCCD / Căn cước</h1>
      <div class="print-summary"></div>
      <div class="print-images"></div>
      <div class="print-qr"></div>
    </div>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
